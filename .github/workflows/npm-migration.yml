name: Finalize npm migration

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  finalize:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Make Diamond public and deprecate the legacy identity
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm access set status=public @gnolith/diamond
          npm access get status @gnolith/diamond
          npm deprecate 'sparql-d1@*' \
            'Moved to @gnolith/diamond. Install @gnolith/diamond instead.'
