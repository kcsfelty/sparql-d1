name: Release artifact

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run check
      - name: Verify release metadata and artifact contents
        run: npm run release:check -- "$GITHUB_REF_NAME"
      - run: npm pack
      - name: Generate SBOM and checksums
        shell: bash
        run: |
          npm sbom --omit=dev --sbom-format cyclonedx > "diamond-${GITHUB_REF_NAME#v}.sbom.json"
          sha256sum ./*.tgz ./*.sbom.json > SHA256SUMS
      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            *.tgz
            *.sbom.json
            SHA256SUMS
      - name: Publish to npm from the public repository
        if: ${{ github.event.repository.private == false }}
        env:
          # Temporary fallback until npm trusted publishing is configured.
          # OIDC takes precedence after that publisher is active.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./*.tgz --access public --provenance
      - env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" ./*.tgz ./*.sbom.json SHA256SUMS
          --generate-notes --verify-tag

      # npm refuses publication while package.json is private, and this workflow
      # additionally skips publishing until the repository itself is public.
